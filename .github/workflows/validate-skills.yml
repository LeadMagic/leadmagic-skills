name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Claude Agent Skills checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Run scripts/validate.sh
        run: |
          chmod +x scripts/validate.sh scripts/build.sh
          ./scripts/validate.sh

      - name: Package skills (smoke)
        run: ./scripts/build.sh

      - name: Upload skill zips
        uses: actions/upload-artifact@v4
        with:
          name: leadmagic-skills
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 14

  package:
    name: Package Skills
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: chmod +x scripts/build.sh && ./scripts/build.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leadmagic-skills-main
          path: dist/*.zip
          retention-days: 30
