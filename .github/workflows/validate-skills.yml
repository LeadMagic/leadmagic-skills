name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/validate.sh'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/validate.sh'
  schedule:
    # Run weekly to check for outdated documentation
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      check_context7:
        description: 'Run Context7 freshness check'
        required: false
        default: 'true'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: |
          echo "Validating skill frontmatter..."
          errors=0

          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="$skill_dir/SKILL.md"

            if [ ! -f "$skill_file" ]; then
              echo "❌ Missing SKILL.md in $skill_name"
              errors=$((errors + 1))
              continue
            fi

            # Check for required frontmatter fields
            if ! head -20 "$skill_file" | grep -q "^name:"; then
              echo "❌ Missing 'name' in $skill_name/SKILL.md"
              errors=$((errors + 1))
              continue
            fi

            if ! head -20 "$skill_file" | grep -q "^description:"; then
              echo "❌ Missing 'description' in $skill_name/SKILL.md"
              errors=$((errors + 1))
              continue
            fi

            # Validate name matches folder
            yaml_name=$(head -20 "$skill_file" | grep "^name:" | sed 's/name: *//')
            if [ "$yaml_name" != "$skill_name" ]; then
              echo "❌ Name mismatch in $skill_name: folder='$skill_name' vs name='$yaml_name'"
              errors=$((errors + 1))
              continue
            fi

            # Check name format (lowercase, hyphens, numbers only)
            if echo "$yaml_name" | grep -qE '[^a-z0-9-]'; then
              echo "❌ Invalid name format in $skill_name: must be lowercase letters, numbers, hyphens"
              errors=$((errors + 1))
              continue
            fi

            # Check name length (max 64 chars)
            if [ ${#yaml_name} -gt 64 ]; then
              echo "❌ Name too long in $skill_name: ${#yaml_name} chars (max 64)"
              errors=$((errors + 1))
              continue
            fi

            # Check for reserved words
            if echo "$yaml_name" | grep -qiE 'anthropic|claude'; then
              echo "❌ Reserved word in name: $skill_name"
              errors=$((errors + 1))
              continue
            fi

            echo "✓ $skill_name"
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "❌ Validation failed with $errors error(s)"
            exit 1
          fi

          echo ""
          echo "✅ All skills validated successfully!"

      - name: Check description length
        run: |
          echo "Checking description lengths (max 1024 chars)..."
          errors=0

          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="$skill_dir/SKILL.md"

            desc=$(head -20 "$skill_file" | grep "^description:" | sed 's/description: *//')
            desc_len=${#desc}

            if [ $desc_len -gt 1024 ]; then
              echo "❌ Description too long in $skill_name: $desc_len chars (max 1024)"
              errors=$((errors + 1))
            else
              echo "✓ $skill_name: $desc_len chars"
            fi
          done

          if [ $errors -gt 0 ]; then
            exit 1
          fi

      - name: Check SKILL.md line count
        run: |
          echo "Checking SKILL.md line counts (max 500 lines)..."
          errors=0
          warnings=0

          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="$skill_dir/SKILL.md"

            line_count=$(wc -l < "$skill_file" | tr -d ' ')

            if [ "$line_count" -gt 500 ]; then
              echo "❌ $skill_name: $line_count lines (exceeds 500 limit)"
              errors=$((errors + 1))
            elif [ "$line_count" -gt 400 ]; then
              echo "⚠️  $skill_name: $line_count lines (approaching 500 limit)"
              warnings=$((warnings + 1))
            else
              echo "✓ $skill_name: $line_count lines"
            fi
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "❌ $errors skill(s) exceed the 500 line limit"
            exit 1
          fi

          if [ $warnings -gt 0 ]; then
            echo ""
            echo "⚠️  $warnings skill(s) approaching the 500 limit"
          fi

          echo ""
          echo "✅ All skills within line limits!"

      - name: Validate rule files
        run: |
          echo "Validating rule files..."

          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            rules_dir="$skill_dir/rules"

            if [ -d "$rules_dir" ]; then
              for rule_file in "$rules_dir"/*.md; do
                [ -f "$rule_file" ] || continue
                rule_name=$(basename "$rule_file")

                # Check for frontmatter
                if ! head -1 "$rule_file" | grep -q "^---"; then
                  echo "⚠️  $skill_name/rules/$rule_name: Missing frontmatter"
                fi

                # Check for title in frontmatter
                if ! head -10 "$rule_file" | grep -q "^title:"; then
                  echo "⚠️  $skill_name/rules/$rule_name: Missing 'title' in frontmatter"
                fi
              done
            fi
          done

          echo "✅ Rule validation complete"

      - name: Skills summary
        run: |
          echo ""
          echo "═══════════════════════════════════════"
          echo "           SKILLS SUMMARY"
          echo "═══════════════════════════════════════"

          total_skills=0
          total_rules=0

          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            rule_count=$(find "$skill_dir/rules" -name "*.md" 2>/dev/null | wc -l | tr -d ' ')
            line_count=$(wc -l < "$skill_dir/SKILL.md" | tr -d ' ')

            printf "  %-35s %3d rules  %4d lines\n" "$skill_name" "$rule_count" "$line_count"

            total_skills=$((total_skills + 1))
            total_rules=$((total_rules + rule_count))
          done

          echo "═══════════════════════════════════════"
          echo "  Total: $total_skills skills, $total_rules rules"
          echo "═══════════════════════════════════════"

  context7-freshness:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check skills against Context7
        env:
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  CONTEXT7 FRESHNESS CHECK"
          echo "  Checking skills against latest documentation"
          echo "═══════════════════════════════════════════════════"
          echo ""

          # Map skills to Context7 library IDs
          declare -A SKILL_TO_CONTEXT7=(
            ["hono-v4"]="hono/hono"
            ["react-best-practices"]="facebook/react"
            ["nextjs-app-router"]="vercel/next.js"
            ["cloudflare-workers"]="cloudflare/workers-sdk"
            ["cloudflare-d1"]="cloudflare/workers-sdk"
            ["cloudflare-kv"]="cloudflare/workers-sdk"
            ["cloudflare-r2"]="cloudflare/workers-sdk"
            ["cloudflare-durable-objects"]="cloudflare/workers-sdk"
            ["cloudflare-workflows"]="cloudflare/workers-sdk"
            ["drizzle-orm"]="drizzle-team/drizzle-orm"
            ["tanstack-query"]="tanstack/query"
            ["tanstack-table"]="tanstack/table"
            ["vercel-ai-sdk"]="vercel/ai"
            ["typescript-best-practices"]="microsoft/TypeScript"
            ["stripe-payments"]="stripe/stripe-node"
            ["inngest"]="inngest/inngest"
            ["biome"]="biomejs/biome"
            ["upstash"]="upstash/redis"
            ["opentelemetry"]="open-telemetry/opentelemetry-js"
          )

          outdated=0
          checked=0

          for skill_name in "${!SKILL_TO_CONTEXT7[@]}"; do
            library_id="${SKILL_TO_CONTEXT7[$skill_name]}"
            skill_file="skills/$skill_name/SKILL.md"

            if [ ! -f "$skill_file" ]; then
              continue
            fi

            checked=$((checked + 1))

            # Extract version from skill if present
            skill_version=$(grep -oP 'v\d+(\.\d+)*' "$skill_file" | head -1 || echo "")

            echo "Checking $skill_name against $library_id..."

            # Query Context7 for latest documentation
            # Note: This is a placeholder - actual implementation depends on Context7 API
            if [ -n "$CONTEXT7_API_KEY" ]; then
              response=$(curl -s -H "Authorization: Bearer $CONTEXT7_API_KEY" \
                "https://api.context7.com/v1/libraries/$library_id/latest" 2>/dev/null || echo "{}")

              latest_version=$(echo "$response" | jq -r '.version // empty' 2>/dev/null || echo "")

              if [ -n "$latest_version" ] && [ -n "$skill_version" ]; then
                if [ "$skill_version" != "$latest_version" ]; then
                  echo "  ⚠️  $skill_name: skill has $skill_version, latest is $latest_version"
                  outdated=$((outdated + 1))
                else
                  echo "  ✓ $skill_name: up to date ($skill_version)"
                fi
              else
                echo "  ℹ️  $skill_name: version check skipped"
              fi
            else
              echo "  ℹ️  $skill_name: mapped to $library_id (API key not configured)"
            fi
          done

          echo ""
          echo "═══════════════════════════════════════════════════"
          echo "  Checked: $checked skills"
          if [ $outdated -gt 0 ]; then
            echo "  ⚠️  Potentially outdated: $outdated skills"
            echo ""
            echo "  Run 'npx @anthropic-ai/claude-code' to update skills"
            echo "  using Context7 MCP for latest documentation."
          else
            echo "  ✅ All checked skills appear current"
          fi
          echo "═══════════════════════════════════════════════════"

      - name: Create freshness report
        run: |
          cat > freshness-report.md << 'EOF'
          # Skills Freshness Report

          Generated: $(date -u +"%Y-%m-%d %H:%M UTC")

          ## Technology Mappings

          | Skill | Context7 Library | Check |
          |-------|------------------|-------|
          | hono-v4 | hono/hono | ✓ |
          | react-best-practices | facebook/react | ✓ |
          | nextjs-app-router | vercel/next.js | ✓ |
          | cloudflare-workers | cloudflare/workers-sdk | ✓ |
          | drizzle-orm | drizzle-team/drizzle-orm | ✓ |
          | tanstack-query | tanstack/query | ✓ |
          | tanstack-table | tanstack/table | ✓ |
          | vercel-ai-sdk | vercel/ai | ✓ |
          | stripe-payments | stripe/stripe-node | ✓ |
          | inngest | inngest/inngest | ✓ |
          | biome | biomejs/biome | ✓ |
          | upstash | upstash/redis | ✓ |
          | opentelemetry | open-telemetry/opentelemetry-js | ✓ |

          ## How to Update

          1. Use Context7 MCP to fetch latest documentation
          2. Compare with current skill content
          3. Update patterns, APIs, and examples as needed
          4. Bump version in SKILL.md metadata

          ```bash
          # Example: Update hono-v4 skill
          npx @anthropic-ai/claude-code "Update skills/hono-v4 using Context7 for hono/hono latest docs"
          ```
          EOF

          echo "Freshness report created"
